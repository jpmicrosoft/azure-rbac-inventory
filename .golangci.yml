version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - unparam
    - gocritic

  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Println
        - fmt.Print
        - (io.Writer).Write
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - commentFormatting
        - hugeParam
    unparam:
      check-exported: false
    staticcheck:
      checks:
        - "all"
        - "-ST1005"
        - "-ST1000"
        - "-QF1008"

  exclusions:
    paths:
      - dist
    rules:
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - errcheck
        source: "recover\\(\\)"

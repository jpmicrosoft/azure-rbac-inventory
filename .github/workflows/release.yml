name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./... -count=1

      - name: Build
        run: go build -ldflags "-s -w" ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  build:
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: azure-rbac-inventory-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: azure-rbac-inventory-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: azure-rbac-inventory-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: azure-rbac-inventory-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: azure-rbac-inventory-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact: azure-rbac-inventory-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w -X main.version=${{ env.VERSION }}" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compress and checksum
        run: |
          cd dist
          # Move artifacts out of subdirectories
          for dir in */; do
            mv "$dir"* . 2>/dev/null || true
            rmdir "$dir" 2>/dev/null || true
          done

          tar czf azure-rbac-inventory-linux-amd64.tar.gz   azure-rbac-inventory-linux-amd64
          tar czf azure-rbac-inventory-linux-arm64.tar.gz   azure-rbac-inventory-linux-arm64
          tar czf azure-rbac-inventory-darwin-amd64.tar.gz  azure-rbac-inventory-darwin-amd64
          tar czf azure-rbac-inventory-darwin-arm64.tar.gz  azure-rbac-inventory-darwin-arm64
          zip     azure-rbac-inventory-windows-amd64.zip    azure-rbac-inventory-windows-amd64.exe
          zip     azure-rbac-inventory-windows-arm64.zip    azure-rbac-inventory-windows-arm64.exe

          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
